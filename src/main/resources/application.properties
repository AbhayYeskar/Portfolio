# ===== DATABASE CONFIGURATION - AUTO CREATE DB =====
spring.datasource.url=jdbc:mysql://localhost:3306/Protfolio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# ===== HIBERNATE CONFIGURATION =====
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update


# ===== CORS CONFIGURATION (Spring Boot 2.7.15) =====
# Allow all origins (for development only)
spring.web.cors.allowed-origins=http://localhost:5174,http://localhost:5174,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
# ===== SHOW SQL =====
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== LOGGING =====
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===== SERVER =====
server.port=8081